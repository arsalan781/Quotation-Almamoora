<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Generator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;font-family:Arial;}
.app{max-width:900px;margin:auto;padding:20px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px;}
.tbtn{padding:8px 12px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:12px;}
.tbtn.primary{background:#000;color:#fff;}
.tbtn.green{background:#25D366;color:#fff;}

#quotation{background:#fff;padding:25px;border:1px solid #ddd;min-height:1100px;}

.q-header{text-align:center;margin-bottom:15px;border-bottom:2px solid #000;padding-bottom:10px;}
.q-company{font-weight:700;font-size:18px;}
.q-sub{font-size:12px;color:#555;}
.q-title{font-weight:700;text-decoration:underline;margin-top:5px;}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.meta-field label{font-size:10px;color:#888;}
.meta-field input{width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;}

.date-line{display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px;font-size:12px;}

table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #ccc;}
th{background:#f0f0f0;padding:8px;}
td input{width:100%;border:none;padding:6px;}

.total-col{text-align:right;padding:8px;font-weight:bold;}

.add-btn{margin-top:10px;width:100%;padding:8px;border:1px dashed #007bff;background:#eef5ff;cursor:pointer;}
.no-export{}
.exporting .no-export{display:none!important;}

.total-section{display:flex;justify-content:flex-end;margin-top:10px;}
.total-box{border:2px solid #000;padding:10px;}

.footer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.footer-field input{width:100%;padding:6px;border:1px solid #ccc;}

@media print{
.toolbar,.add-btn{display:none!important;}
}
</style>

</head>

<body>

<div class="app">

<div class="toolbar">
<button class="tbtn primary" onclick="exportPDF()">Save PDF</button>
<button class="tbtn" onclick="exportPNG()">Export PNG</button>
<button class="tbtn" onclick="printDoc()">Print</button>
<button class="tbtn green" onclick="shareWhatsApp()">WhatsApp</button>
<button class="tbtn" onclick="shareGeneral()">Share</button>

<select id="currencySelect" class="tbtn">
<option value="DH">DH</option>
<option value="₹">₹</option>
<option value="$">$</option>
<option value="€">€</option>
<option value="£">£</option>
</select>
</div>

<div id="quotation">

<div class="q-header">
<div class="q-company">ALMAMOORA ALUMINIUM</div>
<div class="q-sub">GLASS AND GATE FITTING</div>
<div class="q-title">QUOTATION</div>
</div>

<div class="meta-grid">
<div class="meta-field">
<label>Client Name</label>
<input type="text">
</div>
<div class="meta-field">
<label>TRN No.</label>
<input type="text" value="100224084200003">
</div>
</div>

<div class="date-line">
DATE: <input type="date" id="dateInput">
</div>

<table>
<thead>
<tr>
<th>SL</th>
<th>Description</th>
<th>Qty</th>
<th>Price (<span id="cur1">DH</span>)</th>
<th>Total (<span id="cur2">DH</span>)</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<button class="add-btn no-export" onclick="addRow()">+ Add Item</button>

<div class="total-section">
<div class="total-box">
Grand Total: <span id="grandTotal">0.00</span> <span id="currencyLabel">DH</span>
</div>
</div>

<div class="footer-grid">
<div class="footer-field">
<label>Authorised Name</label>
<input type="text" value="MUHAMMAD ZULFIKAR">
</div>
<div class="footer-field">
<label>Contact Number</label>
<input type="text" value="0501785622">
</div>
</div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let rowCount=0;
document.getElementById('dateInput').value=new Date().toISOString().split('T')[0];

function addRow(){
rowCount++;
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${rowCount}</td>
<td><input></td>
<td><input type="number" class="qty" value="1"></td>
<td><input type="number" class="price" value="0"></td>
<td class="total-col">0.00</td>`;
document.getElementById('tableBody').appendChild(tr);
tr.querySelectorAll('input').forEach(i=>i.oninput=recalc);
recalc();
}

function recalc(){
let total=0;
document.querySelectorAll('#tableBody tr').forEach(r=>{
const d=r.children[1].querySelector('input').value.trim();
const q=parseFloat(r.querySelector('.qty').value)||0;
const pr=parseFloat(r.querySelector('.price').value)||0;

if(!d && q===0 && pr===0){r.style.display="none";return;}
else{r.style.display="";}

const t=q*pr;
r.querySelector('.total-col').textContent=t.toFixed(2);
total+=t;
});
document.getElementById('grandTotal').textContent=total.toFixed(2);
}

document.getElementById('currencySelect').onchange=function(){
document.getElementById('currencyLabel').textContent=this.value;
document.getElementById('cur1').textContent=this.value;
document.getElementById('cur2').textContent=this.value;
};

async function prepare(){
document.getElementById('quotation').classList.add('exporting');
await new Promise(r=>setTimeout(r,200));
}

function reset(){
document.getElementById('quotation').classList.remove('exporting');
}

async function exportPNG(){
await prepare();
const canvas=await html2canvas(document.getElementById('quotation'),{scale:3});
reset();
const link=document.createElement('a');
link.download='quotation.png';
link.href=canvas.toDataURL();
link.click();
}

async function exportPDF(){
await prepare();
const canvas=await html2canvas(document.getElementById('quotation'),{scale:3});
reset();

const img=canvas.toDataURL('image/png');
const {jsPDF}=window.jspdf;
const pdf=new jsPDF();
const w=190;
const h=canvas.height*w/canvas.width;

pdf.addImage(img,'PNG',10,10,w,h);
pdf.save('quotation.pdf');
}

function printDoc(){
prepare().then(()=>{
window.print();
setTimeout(reset,500);
});
}

async function shareWhatsApp(){
await prepare();
const canvas=await html2canvas(document.getElementById('quotation'),{scale:2});
reset();

canvas.toBlob(blob=>{
const file=new File([blob],'quotation.png',{type:'image/png'});
if(navigator.canShare&&navigator.canShare({files:[file]})){
navigator.share({files:[file],title:'Quotation'});
}else{
window.open('https://wa.me/','_blank');
}
});
}

async function shareGeneral(){
await prepare();
const canvas=await html2canvas(document.getElementById('quotation'),{scale:2});
reset();

canvas.toBlob(blob=>{
const file=new File([blob],'quotation.png',{type:'image/png'});
if(navigator.canShare&&navigator.canShare({files:[file]})){
navigator.share({files:[file],title:'Quotation'});
}
});
}

addRow();
</script>

</body>
</html>
